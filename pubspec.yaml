name: oldy
description: "Oldy - Health management app for elderly care"
publish_to: 'none'
version: 1.0.6+6

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Routing
  go_router: ^14.8.1

  # Models
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0

  # Firebase
  firebase_core: ^3.12.1
  firebase_auth: ^5.5.1
  cloud_firestore: ^5.6.5
  firebase_storage: ^12.4.4
  firebase_messaging: ^15.2.4
  firebase_crashlytics: ^4.3.3
  firebase_analytics: ^11.5.2

  # Health integration
  health: ^13.3.1

  # UI
  cached_network_image: ^3.4.1
  image_picker: ^1.1.2
  record: ^6.0.0
  audioplayers: ^6.1.0
  fl_chart: ^0.70.2
  intl: any
  timeago: ^3.7.0
  shimmer: ^3.0.0
  flutter_svg: ^2.0.17

  # Notifications
  flutter_local_notifications: ^18.0.1

  # Social auth
  google_sign_in: ^6.2.1
  sign_in_with_apple: ^7.0.1
  crypto: ^3.0.6

  # Utils
  uuid: ^4.5.1
  path_provider: ^2.1.5
  url_launcher: ^6.3.1
  share_plus: ^10.1.4
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Code generation
  build_runner: ^2.4.14
  freezed: ^3.0.0
  json_serializable: ^6.9.4
  riverpod_generator: ^2.6.3
  custom_lint: ^0.7.5
  riverpod_lint: ^2.6.3

  # Testing
  mocktail: ^1.0.4

  # App icon & splash
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/icons/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/app_icon.png"
  min_sdk_android: 21
  remove_alpha_ios: true
  web:
    generate: false

flutter_native_splash:
  color: "#FFFFFF"
  image: "assets/icons/splash_logo.png"
  color_dark: "#1A1A1A"
  image_dark: "assets/icons/splash_logo.png"
  android_12:
    color: "#FFFFFF"
    icon_background_color: "#FFFFFF"
    image: "assets/icons/splash_logo.png"
    color_dark: "#1A1A1A"
    icon_background_color_dark: "#1A1A1A"
    image_dark: "assets/icons/splash_logo.png"
